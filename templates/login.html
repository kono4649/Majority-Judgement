{% extends "base.html" %}
{% block title %}ログイン{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-4">
          <i class="bi bi-box-arrow-in-right text-primary me-2"></i>ログイン
        </h2>

        {% if activated %}
          <div class="alert alert-success">
            <i class="bi bi-check-circle me-2"></i>アカウントが有効化されました！ログインしてください。
          </div>
        {% endif %}

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="/auth/login">
          <div class="mb-3">
            <label class="form-label">メールアドレス</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">パスワード</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>ログイン
            </button>
          </div>
        </form>

        <hr>
        <p class="text-center text-muted mb-0">
          アカウントをお持ちでない方は <a href="/auth/register">新規登録</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
