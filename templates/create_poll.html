{% extends "base.html" %}
{% block title %}投票フォーム作成{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h1 class="h3 mb-4"><i class="bi bi-plus-circle text-primary me-2"></i>投票フォーム作成</h1>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="/polls/create" id="pollForm">
      <div class="card border-0 shadow-sm mb-3">
        <div class="card-header bg-primary text-white fw-semibold">基本情報</div>
        <div class="card-body p-4">
          <div class="mb-3">
            <label class="form-label fw-semibold">タイトル <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" required placeholder="例: 次回のランチ場所">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">説明（任意）</label>
            <textarea name="description" class="form-control" rows="2"
                      placeholder="投票の説明や注意事項など"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">投票方式 <span class="text-danger">*</span></label>
            <select name="voting_method" id="votingMethod" class="form-select" required onchange="onMethodChange(this.value)">
              <option value="">-- 選択してください --</option>
              {% for key, label in voting_methods.items() %}
              <option value="{{ key }}">{{ label }}</option>
              {% endfor %}
            </select>
            <div id="methodHelp" class="form-text text-info mt-1"></div>
          </div>
        </div>
      </div>

      <!-- 方式別の追加設定 -->
      <div id="methodSettings" class="card border-0 shadow-sm mb-3 d-none">
        <div class="card-header bg-info-subtle fw-semibold">投票方式の設定</div>
        <div class="card-body p-4" id="methodSettingsBody"></div>
      </div>
      <input type="hidden" name="method_settings" id="methodSettingsJson" value="{}">

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-header bg-primary text-white fw-semibold">
          選択肢 <span class="badge bg-white text-primary ms-1" id="optionCount">0</span>
        </div>
        <div class="card-body p-4">
          <div id="optionList" class="mb-3">
            <div class="option-row d-flex gap-2 mb-2">
              <input type="text" class="form-control option-input" placeholder="選択肢 1" required>
              <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeOption(this)">
                <i class="bi bi-x"></i>
              </button>
            </div>
            <div class="option-row d-flex gap-2 mb-2">
              <input type="text" class="form-control option-input" placeholder="選択肢 2" required>
              <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeOption(this)">
                <i class="bi bi-x"></i>
              </button>
            </div>
          </div>
          <button type="button" class="btn btn-outline-primary btn-sm" onclick="addOption()">
            <i class="bi bi-plus me-1"></i>選択肢を追加
          </button>
          <input type="hidden" name="options" id="optionsJson">
        </div>
      </div>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-primary text-white fw-semibold">有効期間（任意）</div>
        <div class="card-body p-4">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">開始日時</label>
              <input type="datetime-local" name="start_time" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">終了日時</label>
              <input type="datetime-local" name="end_time" class="form-control">
            </div>
          </div>
          <div class="form-text">未設定の場合、いつでも投票を受け付けます。</div>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-lg px-4" onclick="return prepareSubmit()">
          <i class="bi bi-check-lg me-2"></i>作成する
        </button>
        <a href="/dashboard" class="btn btn-outline-secondary btn-lg">キャンセル</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const METHOD_HELP = {
  plurality:  "最も票を得た選択肢が勝者。各投票者は1つだけ選択します。",
  approval:   "許容できる選択肢すべてに投票できます。承認数が最多の選択肢が勝者。",
  borda:      "全選択肢に順位をつけます。1位=n-1点, 2位=n-2点...で合計点を比較。",
  irv:        "全選択肢に優先順位をつけます。過半数なければ最下位を除外して再集計。",
  condorcet:  "全選択肢に優先順位をつけます。一対一比較で全員に勝る選択肢が勝者。",
  score:      "各選択肢にスコアを付けます。平均スコアが最高の選択肢が勝者。",
  majority_judgement: "各選択肢を「優秀/とても良い/良い/許容/不良/拒否」で評価。中央値評価で順位付け。",
  quadratic:  "クレジット予算内で票を配分。コストは票数の2乗。支持の強度を表現できます。",
  negative:   "各選択肢に賛成(+1)または反対(-1)を投じられます。最も高い合計点の選択肢が勝者。",
};

function onMethodChange(method) {
  document.getElementById('methodHelp').textContent = METHOD_HELP[method] || '';
  const settingsDiv = document.getElementById('methodSettings');
  const body = document.getElementById('methodSettingsBody');
  body.innerHTML = '';

  if (method === 'score') {
    settingsDiv.classList.remove('d-none');
    body.innerHTML = `
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">最小スコア</label>
          <input type="number" id="scoreMin" class="form-control" value="0" min="0">
        </div>
        <div class="col-md-4">
          <label class="form-label">最大スコア</label>
          <input type="number" id="scoreMax" class="form-control" value="10" min="1">
        </div>
      </div>`;
  } else if (method === 'quadratic') {
    settingsDiv.classList.remove('d-none');
    body.innerHTML = `
      <div class="col-md-4">
        <label class="form-label">クレジット予算</label>
        <input type="number" id="qvBudget" class="form-control" value="100" min="1">
        <div class="form-text">各投票者が持つクレジット数（コスト＝票数²）</div>
      </div>`;
  } else {
    settingsDiv.classList.add('d-none');
  }
}

function addOption() {
  const list = document.getElementById('optionList');
  const count = list.querySelectorAll('.option-row').length + 1;
  const div = document.createElement('div');
  div.className = 'option-row d-flex gap-2 mb-2';
  div.innerHTML = `
    <input type="text" class="form-control option-input" placeholder="選択肢 ${count}">
    <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeOption(this)">
      <i class="bi bi-x"></i>
    </button>`;
  list.appendChild(div);
  updateCount();
}

function removeOption(btn) {
  const rows = document.querySelectorAll('.option-row');
  if (rows.length <= 2) { alert('選択肢は2つ以上必要です。'); return; }
  btn.closest('.option-row').remove();
  updateCount();
}

function updateCount() {
  const c = document.querySelectorAll('.option-input').length;
  document.getElementById('optionCount').textContent = c;
}

function prepareSubmit() {
  const inputs = document.querySelectorAll('.option-input');
  const options = Array.from(inputs).map(i => i.value.trim()).filter(v => v);
  if (options.length < 2) { alert('選択肢は2つ以上入力してください。'); return false; }
  document.getElementById('optionsJson').value = JSON.stringify(options);

  const method = document.getElementById('votingMethod').value;
  let settings = {};
  if (method === 'score') {
    settings.min = parseInt(document.getElementById('scoreMin')?.value || 0);
    settings.max = parseInt(document.getElementById('scoreMax')?.value || 10);
  } else if (method === 'quadratic') {
    settings.budget = parseInt(document.getElementById('qvBudget')?.value || 100);
  }
  document.getElementById('methodSettingsJson').value = JSON.stringify(settings);
  return true;
}

updateCount();
</script>
{% endblock %}
