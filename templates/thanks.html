{% extends "base.html" %}
{% block title %}投票完了{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center py-5">
    <div class="mb-4">
      <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
    </div>
    <h1 class="h2 mb-3">投票ありがとうございました！</h1>
    {% if poll %}
      <p class="text-muted mb-4">
        「<strong>{{ poll.title }}</strong>」への投票が完了しました。
      </p>
      <div class="d-flex gap-3 justify-content-center">
        <a href="/vote/{{ poll.public_id }}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>投票ページに戻る
        </a>
        <a href="/" class="btn btn-primary">
          <i class="bi bi-house me-1"></i>ホームへ
        </a>
      </div>
    {% else %}
      <a href="/" class="btn btn-primary">ホームへ</a>
    {% endif %}
  </div>
</div>
{% endblock %}
